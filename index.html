<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Menu</title>

<style>
body {
    font-family: Arial;
    background: #1e293b;
    color: white;
    text-align: center;
    margin: 0;
}

/* kontener */
.container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 90vh;
    padding: 20px;
    box-sizing: border-box;
}

/* kafelki */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-top: 30px;
    width: 100%;
    max-width: 900px;
}

.tile {
    background: #334155;
    padding: 40px 20px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
    font-size: 18px;
}

.tile:hover {
    background: #475569;
    transform: scale(1.05);
}

/* submenu */
.submenu {
    display: none;
    margin-top: 30px;
    width: 100%;
    max-width: 500px;
}

.submenu button {
    display: block;
    margin: 10px auto;
    padding: 12px 20px;
    font-size: 16px;
    cursor: pointer;
    width: 100%;
    border-radius: 10px;
}

/* powrót */
.back {
    margin-top: 20px;
}

/* stopka */
.footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    padding: 0 10px;
    box-sizing: border-box;
}

.donate-tile {
    background: #0ea5e9;
    padding: 20px;
    margin: 0 auto;
    width: min(320px, 90%);
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    font-size: 24px;
    transition: 0.3s;
    animation: pulse 1.8s infinite;
}

.donate-tile:hover {
    background: #38bdf8;
    transform: scale(1.05);
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
}

/* MOBILE */
@media (max-width: 768px) {
    h1 {
        font-size: 26px;
    }

    .tile {
        padding: 28px 15px;
        font-size: 17px;
    }

    .submenu button {
        font-size: 17px;
        padding: 14px;
    }

    .donate-tile {
        font-size: 20px;
        padding: 18px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1 id="title">Wybierz kategorię</h1>

    <!-- KAFELKI -->
    <div id="mainMenu" class="grid">
        <div class="tile" onclick="showMenu('testy')">Testy cząstkowe</div>
        <div class="tile" onclick="showMenu('egzamin')">Egzamin końcowy</div>
        <div class="tile" onclick="showMenu('ulc')">Pytania ULC</div>
    </div>

    <!-- TESTY -->
    <div id="testy" class="submenu">
    <button onclick="location.href='test.html#test0'">Test 0</button>
    <button onclick="location.href='test.html#test1'">Test 1</button>
    <button onclick="location.href='test.html#test2'">Test 2</button>
    <button onclick="location.href='test.html#test3'">Test 3</button>
    <button onclick="location.href='test.html#test4'">Test 4</button>
    <button onclick="location.href='test.html#test5'">Test 5</button>
    <button onclick="location.href='test.html#test6'">Test 6</button>

    <button class="back" onclick="back()">⬅ Powrót</button>
</div>

    <!-- EGZAMIN -->
    <div id="egzamin" class="submenu">
        <button onclick="location.href='test.html#egzamin'">Egzamin końcowy - zestaw 3</button>
        <button onclick="location.href='test.html#random'">Losowy test</button>
        <button class="back" onclick="back()">⬅ Powrót</button>
    </div>

    <!-- ULC (NAPRAWIONE) -->
    <div id="ulc" class="submenu">
    <button onclick="location.href='test.html#ulc'">Pytania ULC</button>
    <button onclick="location.href='test.html#ulc-random'">Losowe pytania ULC</button>
    <button class="back" onclick="back()">⬅ Powrót</button>
</div>

</div>

<!-- STOPKA -->
<div class="footer">
    <div class="donate-tile" onclick="window.open('https://buycoffee.to/davidoff', '_blank')">
        💙 Postaw kawę – kliknij
    </div>
</div>

<script>
function showMenu(menu){
    document.getElementById("mainMenu").style.display = "none";
    document.getElementById("title").innerText = "Wybierz test";
    document.getElementById(menu).style.display = "block";
}

function back(){
    document.getElementById("mainMenu").style.display = "grid";
    document.getElementById("title").innerText = "Wybierz kategorię";

    document.querySelectorAll(".submenu").forEach(el=>{
        el.style.display = "none";
    });
}
</script>

</body>
</html>
